name: competitor-watch

# Weekly scan: detect competitor coverage gaps + suggest roadmap updates.
# Cross-link Alyx Phase 07 tools-monitor pattern, adapted per-product.
# State persisted en runs/competitor-watch/state.json (commit-only via PR).

on:
  schedule:
    - cron: "0 12 * * 1"   # Monday 12:00 UTC = Monday 6 AM CST
  workflow_dispatch:        # manual trigger via Actions UI

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install feedparser pyyaml requests

      - name: Run competitor scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/competitor_watch.py \
            --config .github/competitors.yml \
            --state runs/competitor-watch/state.json \
            --output runs/competitor-watch/report-$(date +%Y-%m-%d).md

      - name: Commit state + report
        run: |
          git config user.name "alyx-competitor-bot"
          git config user.email "bot@penguinalley.com"
          git add runs/competitor-watch/
          git diff --cached --quiet || git commit -m "competitor-watch: weekly scan $(date +%Y-%m-%d)"
          git push

      - name: Open issue if gap-closure detected
        if: ${{ env.GAP_CLOSED == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.GAP_REPORT_PATH, 'utf8');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[competitor-watch] Gap-closure detected — review roadmap`,
              body: body,
              labels: ['competitor-watch', 'roadmap-review']
            });

  roadmap-adaptation:
    runs-on: ubuntu-latest
    needs: scan
    if: ${{ github.event_name == 'workflow_dispatch' || success() }}
    steps:
      - uses: actions/checkout@v4

      - name: Open PR to ROADMAP.md if state changed
        run: |
          if git diff --quiet ROADMAP.md; then
            echo "No roadmap changes needed."
          else
            git config user.name "alyx-competitor-bot"
            git config user.email "bot@penguinalley.com"
            BRANCH="competitor-watch/$(date +%Y-%m-%d)"
            git checkout -b "$BRANCH"
            git add ROADMAP.md
            git commit -m "roadmap: weekly competitor-driven update"
            git push origin "$BRANCH"
            gh pr create --title "roadmap: weekly competitor-driven update" \
                          --body "Auto-generated by competitor-watch workflow. Review competitive landscape table changes." \
                          --base main \
                          --head "$BRANCH" \
                          --label "competitor-watch,automated"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
