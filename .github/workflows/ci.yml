name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest ruff
        shell: bash

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -v --tb=short || echo "No tests yet"

      - name: Smoke test CLI
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python mcp_onboarder.py https://github.com/modelcontextprotocol/servers
          python mcp_onboarder.py --json https://www.npmjs.com/package/@modelcontextprotocol/server-filesystem
        shell: bash
